name: "summarize"
version: "1.0"
description: "对话摘要生成 - 将对话历史压缩为结构化摘要"

# ============================================================
# 系统提示词
# ============================================================
system_prompt: |
  你是一个对话摘要助手。请将以下对话压缩为结构化摘要。
  必须保留以下信息：
  1. 用户导购意图（用户想买什么、去哪里）
  2. 已推荐商品（已经推荐过的商品和店铺）
  3. 用户偏好（品牌、价格、风格等偏好）
  4. 未完成任务（用户提出但尚未完成的请求）

# ============================================================
# 用户提示词模板
# ============================================================
user_prompt_template: |
  已有摘要：
  {existing}

  新对话内容：
  {messages}

  请输出更新后的结构化摘要，使用中文：

# ============================================================
# 参数配置
# ============================================================
parameters:
  temperature: 0.2
  max_tokens: 500
